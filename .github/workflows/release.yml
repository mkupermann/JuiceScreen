name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required so softprops/action-gh-release can create the draft release

jobs:
  build-dmg:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install tooling
        run: |
          brew bundle --file=Brewfile
          # Log resolved versions so drift in unpinned brew formulas is visible
          # in the workflow output and can be diff'd against past runs.
          echo "Resolved tool versions:"
          xcodegen --version || xcodegen version || true
          create-dmg --version | head -1 || true
          xcbeautify --version || true

      - name: Verify VERSION matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION="$(cat VERSION)"
          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "❌ Tag $TAG_VERSION does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "✅ Version match: $FILE_VERSION"

      - name: Guard against placeholder Sparkle public key
        run: |
          if grep -q 'PLACEHOLDER_GENERATE_IN_PLAN_10' JuiceScreen/Resources/Info.plist; then
            echo "❌ SUPublicEDKey is still the literal placeholder."
            echo "   Generate the EdDSA keypair (see docs/RELEASE.md) and replace"
            echo "   the placeholder in Info.plist + project.yml before tagging."
            exit 1
          fi
          echo "✅ SUPublicEDKey looks like a real key (not the placeholder)"

      - name: Build app
        run: bash scripts/build-release.sh

      - name: Make DMG
        run: bash scripts/make-dmg.sh

      - name: Compute DMG metadata
        id: dmg
        run: |
          VERSION="$(cat VERSION)"
          DMG="build/JuiceScreen-${VERSION}.dmg"
          SHA="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          SIZE="$(stat -f %z "$DMG")"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG"              >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"           >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"            >> "$GITHUB_OUTPUT"

      - name: Create draft release + upload DMG
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "JuiceScreen ${{ steps.dmg.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.dmg.outputs.dmg }}
          body: |
            ## JuiceScreen ${{ steps.dmg.outputs.version }}

            This is a draft release. Maintainer must:
            1. Download the DMG attached below.
            2. Locally run `SPARKLE_ED_KEY=... scripts/sign-update.sh <dmg>` to get the EdDSA signature.
            3. Locally run `scripts/update-appcast.sh <signature> <length> <download-url>` and commit the appcast change.
            4. Edit this draft release: paste the changelog, click **Publish**.

            **DMG sha256:** `${{ steps.dmg.outputs.sha256 }}`
            **DMG size:**   `${{ steps.dmg.outputs.size }}` bytes
